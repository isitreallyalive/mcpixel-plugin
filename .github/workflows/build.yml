name: Build plugin
on:
  workflow_dispatch:

jobs:
  natives:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-linker for aarch64 Linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ffi

      - name: Build library
        working-directory: ffi
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine library name
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              echo "LIBFILE=ffi.dll" >> $GITHUB_ENV ;;
            x86_64-unknown-linux-gnu|aarch64-unknown-linux-gnu)
              echo "LIBFILE=libffi.so" >> $GITHUB_ENV ;;
            x86_64-apple-darwin|aarch64-apple-darwin)
              echo "LIBFILE=libffi.dylib" >> $GITHUB_ENV ;;
            *)
              echo "Unsupported target" >&2
              exit 1 ;;
          esac

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ffi/target/${{ matrix.target }}/release/${{ env.LIBFILE }}

  jar:
    name: Build JAR
    needs: natives
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download all native libraries
        uses: actions/download-artifact@v8
        with:
          path: natives-download

      - name: Stage native libraries
        run: |
          for target in \
            x86_64-pc-windows-msvc \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            mkdir -p ffi/target/$target/release
            cp natives-download/$target/* ffi/target/$target/release/
          done

      - name: Build JAR
        run: ./gradlew build -Pmode=release --no-daemon

      - name: Rename JAR
        run: mv build/libs/*-all.jar build/libs/$(ls build/libs/*-all.jar | sed 's/-all\.jar$/.jar/' | xargs basename)

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mcpixel
          path: build/libs/mcpixel-*.jar
