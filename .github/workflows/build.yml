name: Build plugin
on:
  workflow_dispatch:

jobs:
  platform:
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }} JAR

    strategy:
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-linker for aarch64 Linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gcc-aarch64-linux-gnu
          version: 1.0

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v6

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ffi

      - name: Build library
        working-directory: ffi
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build JAR
        run: ./gradlew build -Pmode=release -Pci -Ptarget=${{ matrix.target }} --no-daemon

      - name: Get project version
        shell: bash
        run: echo "VERSION=$(./gradlew -q version)" >> $GITHUB_ENV

      - name: Determine library name
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              echo "LIBFILE=ffi.dll" >> $GITHUB_ENV ;;
            x86_64-unknown-linux-gnu|aarch64-unknown-linux-gnu)
              echo "LIBFILE=libffi.so" >> $GITHUB_ENV ;;
            x86_64-apple-darwin|aarch64-apple-darwin)
              echo "LIBFILE=libffi.dylib" >> $GITHUB_ENV ;;
            *)
              echo "Unsupported target" >&2
              exit 1 ;;
          
          esac

      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ffi/target/${{ matrix.target }}/release/${{ env.LIBFILE }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mcpixel ${{ env.VERSION }} for ${{ matrix.name }}
          path: build/libs/mcpixel-${{ env.VERSION }}-${{ matrix.name }}.jar

  universal:
    name: Build universal JAR
    needs: platform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download all native libraries
        uses: actions/download-artifact@v8
        with:
          path: natives-download

      - name: Stage native libraries
        run: |
          for target in \
            x86_64-pc-windows-msvc \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            mkdir -p ffi/target/$target/release
            cp natives-download/$target/* ffi/target/$target/release/
          done

      - name: Build JAR
        run: ./gradlew build -Pmode=release -Pci --no-daemon

      - name: Get project version
        id: gradle_version
        run: echo "VERSION=$(./gradlew -q version)" >> $GITHUB_ENV

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mcpixel ${{ env.VERSION }}
          path: build/libs/mcpixel-${{ env.VERSION }}-universal.jar
